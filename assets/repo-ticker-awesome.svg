  <!-- Bottom border -->
  <rect x="0" y="147" width="900" height="1" fill="#e1e4e8"/>

  <!-- Midline for grouping reference -->
  <line x1="0" y1="75" x2="900" y2="75" stroke="#e1e4e8" stroke-width="1" stroke-dasharray="8 6" opacity="0.6"/>

  <!-- Ticker label on left -->
  <rect x="0" y="0" width="120" height="150" fill="#f6f8fa" rx="8"/>
  <text x="60" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600"
        fill="#24292e" text-anchor="middle">CLAUDE CODE</text>
